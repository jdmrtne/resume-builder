<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="60%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow1" cx="30%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <!-- Card shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- Glow filter for logo -->
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.07"/>
    </pattern>
    <!-- Feature card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2d4a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect width="1200" height="400" fill="url(#glow1)"/>
  <rect width="1200" height="400" fill="url(#glow2)"/>

  <!-- Subtle horizontal line accent -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#f97316" stroke-width="3" opacity="0.7"/>

  <!-- ─── LEFT SECTION: Branding ─── -->

  <!-- Logo bolt icon -->
  <g filter="url(#logoGlow)" transform="translate(72, 100)">
    <polygon points="38,0 20,40 38,40 20,80 52,30 30,30" fill="#f97316" opacity="0.95"/>
    <!-- subtle glow ring -->
    <circle cx="26" cy="40" r="44" fill="none" stroke="#f97316" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Brand name -->
  <text x="148" y="155" font-family="'Segoe UI', system-ui, sans-serif" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-2">
    Resume<tspan fill="#f97316">Forge</tspan>
  </text>

  <!-- Tagline -->
  <text x="150" y="192" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" fill="#94a3b8" letter-spacing="0.5">
    AI-powered resume builder that gets you hired
  </text>

  <!-- Divider line -->
  <line x1="150" y1="215" x2="560" y2="215" stroke="#334155" stroke-width="1"/>

  <!-- Badges row -->
  <!-- Badge: Open Source -->
  <rect x="150" y="228" width="114" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="207" y="247" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">⚡ Open Source</text>

  <!-- Badge: 10 Templates -->
  <rect x="272" y="228" width="114" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="329" y="247" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">📄 10 Templates</text>

  <!-- Badge: Supabase -->
  <rect x="394" y="228" width="114" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="451" y="247" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">🗄 Supabase Auth</text>

  <!-- Feature labels row -->
  <text x="150" y="295" font-family="'Segoe UI', sans-serif" font-size="13" fill="#64748b">
    ✦ ATS Analyzer  ✦ Keyword Matcher  ✦ AI Bullets  ✦ Public Link  ✦ PDF Export
  </text>

  <!-- Tech stack -->
  <text x="150" y="336" font-family="'Segoe UI', sans-serif" font-size="12" fill="#475569">
    Built with: HTML · CSS · Vanilla JS · Supabase · html2pdf.js
  </text>

  <!-- GitHub Pages badge -->
  <rect x="150" y="355" width="148" height="30" rx="8" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1" stroke-opacity="0.4"/>
  <text x="224" y="374" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#f97316" text-anchor="middle">
    🚀 Deploy on GitHub Pages
  </text>

  <!-- ─── RIGHT SECTION: Resume preview mockup ─── -->
  <!-- Outer card shadow -->
  <g filter="url(#shadow)">
    <!-- Resume card -->
    <rect x="660" y="40" width="220" height="300" rx="8" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5"/>
    <!-- Card header (colored) -->
    <rect x="660" y="40" width="220" height="50" rx="8" fill="#4f46e5"/>
    <rect x="660" y="70" width="220" height="20" fill="#4f46e5"/>

    <!-- Name placeholder -->
    <rect x="680" y="54" width="110" height="10" rx="3" fill="rgba(255,255,255,0.7)"/>
    <rect x="680" y="68" width="80" height="6" rx="2" fill="rgba(255,255,255,0.4)"/>

    <!-- Resume content lines -->
    <rect x="680" y="110" width="60" height="5" rx="2" fill="#f97316" opacity="0.8"/>
    <rect x="680" y="122" width="176" height="4" rx="2" fill="#334155"/>
    <rect x="680" y="130" width="150" height="4" rx="2" fill="#334155"/>
    <rect x="680" y="138" width="160" height="4" rx="2" fill="#334155"/>

    <rect x="680" y="158" width="60" height="5" rx="2" fill="#f97316" opacity="0.8"/>
    <rect x="680" y="170" width="176" height="4" rx="2" fill="#334155"/>
    <rect x="680" y="178" width="140" height="4" rx="2" fill="#334155"/>
    <rect x="680" y="186" width="165" height="4" rx="2" fill="#334155"/>
    <rect x="680" y="194" width="130" height="4" rx="2" fill="#334155"/>

    <rect x="680" y="214" width="60" height="5" rx="2" fill="#f97316" opacity="0.8"/>
    <rect x="680" y="226" width="176" height="4" rx="2" fill="#334155"/>
    <rect x="680" y="234" width="155" height="4" rx="2" fill="#334155"/>

    <rect x="680" y="254" width="60" height="5" rx="2" fill="#f97316" opacity="0.8"/>
    <!-- Skill pills -->
    <rect x="680" y="266" width="46" height="14" rx="7" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>
    <rect x="732" y="266" width="46" height="14" rx="7" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>
    <rect x="784" y="266" width="46" height="14" rx="7" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>
    <rect x="680" y="285" width="46" height="14" rx="7" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>
    <rect x="732" y="285" width="46" height="14" rx="7" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>

    <!-- Score badge floating over card -->
    <rect x="848" y="60" width="90" height="90" rx="16" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="893" y="100" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#22d3ee" text-anchor="middle">92</text>
    <text x="893" y="116" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">ATS SCORE</text>
    <path d="M 870 135 Q 893 145 916 135" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- AI badge floating -->
    <rect x="848" y="175" width="90" height="50" rx="10" fill="#0f172a" stroke="#f97316" stroke-width="1.5"/>
    <text x="893" y="196" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#f97316" text-anchor="middle">✨ AI</text>
    <text x="893" y="213" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">BULLETS</text>

    <!-- Keywords badge floating -->
    <rect x="848" y="250" width="90" height="50" rx="10" fill="#0f172a" stroke="#818cf8" stroke-width="1.5"/>
    <text x="893" y="271" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#818cf8" text-anchor="middle">🔑 85%</text>
    <text x="893" y="288" font-family="'Segoe UI', sans-serif" font-size="9" fill="#64748b" text-anchor="middle">KEYWORDS</text>
  </g>

  <!-- Template switcher row at bottom of mockup -->
  <rect x="660" y="355" width="44" height="28" rx="6" fill="#4f46e5"/>
  <rect x="710" y="355" width="44" height="28" rx="6" fill="#1e293b" stroke="#334155"/>
  <rect x="760" y="355" width="44" height="28" rx="6" fill="#1e293b" stroke="#334155"/>
  <rect x="810" y="355" width="44" height="28" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="682" y="374" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">Classic</text>
  <text x="732" y="374" font-family="sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Modern</text>
  <text x="782" y="374" font-family="sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Tech</text>
  <text x="832" y="374" font-family="sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Exec</text>

  <!-- Bottom border accent -->
  <line x1="0" y1="399" x2="1200" y2="399" stroke="#f97316" stroke-width="2" opacity="0.4"/>
</svg>
